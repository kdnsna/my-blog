name: 功能请求
about: 提出一个新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢您的功能建议！请尽可能详细地描述您的需求和使用场景。

  - type: textarea
    id: problem
    attributes:
      label: 解决的问题
      description: 这个功能要解决什么问题？描述您遇到的具体痛点。
      placeholder: |
        描述当前遇到的问题：
        例如：目前日记列表没有分页功能，当日记数量增多时页面加载很慢。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 解决方案
      description: 您期望的功能是什么？请描述理想的解决方案。
      placeholder: |
        期望的功能：
        例如：添加日记列表分页功能，每页显示 10 条，支持跳转页码。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 您考虑过哪些替代方案？
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 使用场景
      description: 这个功能在什么场景下会被使用？
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 任何其他相关信息或附件
    validations:
      required: false
